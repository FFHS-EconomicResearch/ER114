<text font-family="sans-serif" font-size="10" fill="#333333" x="586" y="134" text-anchor="middle">Mustererkennung (hochdim.)</text>
<text font-family="sans-serif" font-size="10" fill="#333333" x="586" y="148" text-anchor="middle">Extraktion handl. Wissens</text>
<text font-family="sans-serif" font-size="10" fill="#686868" x="586" y="162" text-anchor="middle">Entscheidungsunterst. (Fayyad 1996)</text>
<rect x="694" y="105" width="206" height="72" rx="4" fill="#ebe0ff" stroke="#502479" stroke-width="0.4"/>
