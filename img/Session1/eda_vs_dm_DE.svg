<text font-family="sans-serif" font-size="10" fill="#333333" x="364" y="134" text-anchor="middle">Deskriptiv, explorativ</text>
<text font-family="sans-serif" font-size="10" fill="#333333" x="364" y="148" text-anchor="middle">Parsimonisch (Filliben/Tukey 1977)</text>
<text font-family="sans-serif" font-size="10" fill="#686868" x="364" y="162" text-anchor="middle">Vorl&#228;ufig, theorieoffen</text>
