<text font-family="sans-serif" font-size="10" fill="#333333" x="797" y="134" text-anchor="middle">Pr&#228;diktiv, pr&#228;skriptiv</text>
<text font-family="sans-serif" font-size="10" fill="#333333" x="797" y="148" text-anchor="middle">Parsimonisch (Effizienz)</text>
<text font-family="sans-serif" font-size="10" fill="#686868" x="797" y="162" text-anchor="middle">Hypothesenfrei, skalierbar</text>

<rect x="36" y="194" width="888" height="52" rx="6" fill="url(#rowGrad)" stroke="#b3b2b2" stroke-width="0.5"/>
