<text font-family="sans-serif" font-size="10" fill="#686868" x="797" y="318" text-anchor="middle">F1, RMSE &#x2014; Performanz</text>

<rect x="36" y="346" width="888" height="44" rx="6" fill="url(#rowGrad)" stroke="#b3b2b2" stroke-width="0.5"/>
