<text font-family="sans-serif" font-size="10" fill="#686868" x="364" y="318" text-anchor="middle">Schiefe &#x2014; deskriptiv</text>
<rect x="488" y="275" width="196" height="55" rx="4" fill="#ebe0ff" stroke="#502479" stroke-width="0.4"/>
<text font-family="sans-serif" font-size="10" font-weight="500" fill="#2d1050" x="586" y="290" text-anchor="middle">Algorithmen</text>
<text font-family="sans-serif" font-size="10" fill="#333333" x="586" y="304" text-anchor="middle">Automatisierte Suche</text>
<text font-family="sans-serif" font-size="10" fill="#686868" x="586" y="318" text-anchor="middle">Hochdim., jenseits menschl. Wahrn.</text>
<rect x="694" y="275" width="206" height="55" rx="4" fill="#ebe0ff" stroke="#502479" stroke-width="0.4"/>
