<text font-family="sans-serif" font-size="10" fill="#333333" x="700" y="379" text-anchor="middle">Gro&#223;, hochdimensional &#x2014; 100s von Features, automatisiert</text>

<rect x="16" y="414" width="928" height="66" rx="8" fill="url(#basisGrad)"/>
