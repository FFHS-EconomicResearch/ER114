<text font-family="sans-serif" font-size="9" font-style="italic" fill="rgba(255,255,255,0.82)" x="480" y="62" text-anchor="middle">auch: Data-Understanding-Schritt in KDD (CRISP-DM)</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#ffffff" x="760" y="65" text-anchor="middle">Data Mining (KDD)</text>

