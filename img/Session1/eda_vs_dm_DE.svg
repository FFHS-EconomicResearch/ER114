<text font-family="sans-serif" font-size="10" fill="#333333" x="146" y="134" text-anchor="middle">Mustererkennung (niedrigdim.)</text>
<text font-family="sans-serif" font-size="10" fill="#333333" x="146" y="148" text-anchor="middle">Hypothesengenerierung</text>
<text font-family="sans-serif" font-size="10" fill="#686868" x="146" y="162" text-anchor="middle">Anomalieerkennung, Aufbereitung</text>
