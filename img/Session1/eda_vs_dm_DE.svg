<text font-family="sans-serif" font-size="10" fill="#333333" x="700" y="232" text-anchor="middle">Irrelevant &#x2014; Stabilit&#228;t der Muster entscheidend</text>

<rect x="36" y="254" width="888" height="84" rx="6" fill="url(#rowGrad)" stroke="#b3b2b2" stroke-width="0.5"/>
